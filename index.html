<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olorsoft Portfolio</title>
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Three.js and GLTFLoader via CDN (No Node.js dependencies) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <!-- Orientation lock overlay -->
    <div id="orientationLock" class="overlay" aria-hidden="true">
        <div class="message">
            <h1>Please Rotate Your Device</h1>
            <p>For the best experience, switch to landscape mode.</p>
        </div>
    </div>

    <!-- UI Overlay (Accessible Fallbacks & Controls will go here) -->
    <div id="uiLayer">
        <header id="portfolioTitle">Loading...</header>
        
        <!-- Crosshair for interaction -->
        <div id="crosshair" aria-hidden="true"></div>

        <!-- Mobile Controls (Hidden on Desktop) -->
        <div id="mobileControls" class="mobile-only" aria-hidden="true">
            <div id="mobileLeftCol">
                <button id="btnForward" class="glass-btn icon-btn" title="Move Forward">W</button>
                <button id="btnBackward" class="glass-btn icon-btn" title="Move Backward">S</button>
            </div>
            <div id="mobileRightCol">
                <button id="btnJump" class="glass-btn icon-btn" title="Jump">JUMP</button>
                <button id="btnInteract" class="glass-btn icon-btn" title="Interact">ACT</button>
            </div>
        </div>

        <!-- Portfolio Item Modal (Glassmorphism) -->
        <div id="itemModal" class="glass-modal hidden" aria-hidden="true" role="dialog">
            <h2 id="modalTitle">Project Title</h2>
            <p id="modalDesc">Project Description</p>
            <a id="modalLink" href="#" target="_blank" class="glass-btn">View Project</a>
            <button id="closeModalBtn" class="glass-btn outline">Close</button>
        </div>

        <div id="loadingScreen" class="overlay">
            <h1 class="glow-text">Initializing Experience...</h1>
        </div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvasContainer" aria-hidden="true"></div>

    <script src="js/engine.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
