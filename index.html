<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olorsoft Portfolio</title>
    <link rel="stylesheet" href="css/main.css">
    
    <!-- Three.js, GLTFLoader, and Cannon.js (Physics) via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>
<body>
    <!-- Orientation lock overlay -->
    <div id="orientationLock" class="overlay" aria-hidden="true">
        <div class="message">
            <h1>Please Rotate Your Device</h1>
            <p>For the best experience, switch to landscape mode.</p>
        </div>
    </div>

    <!-- UI Overlay (Accessible Fallbacks & Controls will go here) -->
    <div id="uiLayer">
        <header id="portfolioTitle">Loading...</header>
        
        <!-- Inventory UI -->
    <div id="inventoryUI" class="glass-panel">
        <div class="inv-slot active" data-tool="hands">✋ Hands</div>
        <div class="inv-slot" data-tool="brush">🖌️ Brush</div>
        <div class="inv-slot" data-tool="washer">🔫 Washer</div>
    </div>

    <!-- Paint Palette UI -->
    <div id="paintPalette" class="glass-panel hidden">
        <div class="palette-colors">
            <div class="color-swatch active" style="background: #ef4444;" data-color="#ef4444"></div>
            <div class="color-swatch" style="background: #3b82f6;" data-color="#3b82f6"></div>
            <div class="color-swatch" style="background: #10b981;" data-color="#10b981"></div>
            <div class="color-swatch" style="background: #f59e0b;" data-color="#f59e0b"></div>
            <div class="color-swatch" style="background: #ffffff;" data-color="#ffffff"></div>
            <div class="color-swatch" style="background: #000000;" data-color="#000000"></div>
        </div>
        <div class="palette-size">
            <label for="brushSize">Size</label>
            <input type="range" id="brushSize" min="5" max="40" value="15">
        </div>
    </div>
        
        <!-- Crosshair for interaction -->
        <div id="crosshair" aria-hidden="true"></div>

        <!-- Mobile Controls (Hidden on Desktop) -->
        <div id="mobileControls" class="hidden">
            <div id="joystick-left">
                <button id="btnForward" class="glass-btn">W</button>
                <div class="strafe-row">
                    <button id="btnLeft" class="glass-btn">A</button>
                    <button id="btnBackward" class="glass-btn">S</button>
                    <button id="btnRight" class="glass-btn">D</button>
                </div>
                <button id="btnJump" class="glass-btn">Jump</button>
            </div>
            <!-- joystick-right is handled by pure touch zone in JS -->
        </div>

        <!-- Portfolio Item Modal (Glassmorphism) -->
        <div id="itemModal" class="glass-modal hidden" aria-hidden="true" role="dialog">
            <h2 id="modalTitle">Project Title</h2>
            <p id="modalDesc">Project Description</p>
            <a id="modalLink" href="#" target="_blank" class="glass-btn">View Project</a>
            <button id="closeModalBtn" class="glass-btn outline">Close</button>
        </div>

        <div id="loadingScreen" class="overlay">
            <h1 class="glow-text">Initializing Experience...</h1>
        </div>
    </div>

    <!-- 3D Canvas Container -->
    <div id="canvasContainer" aria-hidden="true"></div>

    <script src="js/engine.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
